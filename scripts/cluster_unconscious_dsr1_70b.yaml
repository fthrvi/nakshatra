# Nakshatra "unconscious tier" — 70B reasoning model split across FOUR machines.
#
# DeepSeek-R1-Distill-Llama-70B (R1 chain-of-thought, 70B). Llama-arch (80 blocks,
# hidden 8192). Split across four 16GB AMD GPUs so each slice fits ENTIRELY in GPU
# (64GB total ≫ 42GB) — AND this box keeps a SMALL slice so the conscious 8B stays
# GPU-resident alongside it (no eviction during think_deeper). Materialized from
# the Sthambha planner's split over the four registered peers. Activation hops
# cross Tailscale (8192 f32 = 32KB/token — the wire is cheap, compute dominates).
#
#   this box  (RX 9070 XT)  [0,10)   first  (token_embd) — small, co-resides w/ conscious
#   bishwa-pc (5700 XT)      [10,33)  middle
#   Mac4      (5700 XT)      [33,56)  middle
#   mac3-2    (5700 XT)      [56,80)  last   (lm_head)
model:
  id: "nakshatra-unconscious-dsr1-70b"
  hidden_size: 8192
  num_blocks: 80
  wire_dtype: f32

workers:
  - id: 70b-prithvi
    address: 127.0.0.1
    port: 5550
    layer_range: [0, 10]
    sub_gguf_path: /home/prithvi/.nakshatra/models/dsr1-70b-w0.gguf
    mode: first
  - id: 70b-bishwapc
    address: 100.109.164.69     # bishwa-pc (Tailscale)
    port: 5550
    layer_range: [10, 33]
    sub_gguf_path: ~/.nakshatra/models/dsr1-70b-w1.gguf
    mode: middle
  - id: 70b-mac4
    address: 100.93.112.98      # Mac4 (Tailscale)
    port: 5550
    layer_range: [33, 56]
    sub_gguf_path: ~/.nakshatra/models/dsr1-70b-w2.gguf
    mode: middle
  - id: 70b-mac3
    address: 100.121.48.32      # mac3-2 (Tailscale)
    port: 5550
    layer_range: [56, 80]
    sub_gguf_path: ~/.nakshatra/models/dsr1-70b-w3.gguf
    mode: last
