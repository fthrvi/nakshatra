    address: 127.0.0.1
    port: 5550
    layer_range: [0, 27]
    sub_gguf_path: /home/prithvi/.nakshatra/models/dsr1-70b-a.gguf
    mode: first
  - id: 70b-mac4
    address: 100.93.112.98      # Mac4 (Tailscale)
    port: 5550
    layer_range: [27, 54]
    sub_gguf_path: /Users/bishwa/.nakshatra/models/dsr1-70b-b.gguf
    mode: middle
  - id: 70b-mac3
