# Nakshatra "unconscious tier" — 70B reasoning model split across TWO machines.
#
# DeepSeek-R1-Distill-Llama-70B (R1 chain-of-thought, 70B — far larger than the 8B
# conscious). Llama-arch (80 blocks, hidden 8192) so the partial-load daemon
# handles it. Split across this box (RX 9070 XT 16GB) + Mac4 (Radeon Pro 5700 XT
# 16GB), both AMD → one vendor group. ~42GB Q4 > 32GB combined GPU, so each worker
# offloads ~28 layers to GPU and spills the rest to RAM (both boxes have ≥64GB).
# The activation hop (8192 f32 = 32KB/token) crosses Tailscale (~66ms) — compute
# dominates the wire (Nakshatra's "Compute, Not the Wire" thesis).
#
# This static YAML is materialized FROM the Sthambha planner's split decision
# (operator-signed POST /plan over the two registered peers); addresses are filled
# from the peers we control. Boundaries here are the nominal 40/40; the planner may
# rebalance by measured VRAM.
model:
  id: "nakshatra-unconscious-dsr1-70b"
  hidden_size: 8192
  num_blocks: 80
  wire_dtype: f32

workers:
  - id: dsr1-70b-a
    address: 127.0.0.1
    port: 5550
    layer_range: [0, 40]
    sub_gguf_path: /home/prithvi/.nakshatra/models/dsr1-70b-a.gguf
    mode: first
  - id: dsr1-70b-b
    address: 100.93.112.98   # Mac4 (Tailscale)
    port: 5550
    layer_range: [40, 80]
    sub_gguf_path: /Users/bishwa/.nakshatra/models/dsr1-70b-b.gguf
    mode: last
