# v0.5 M0.5.4 v1 test config — 2-worker toy chain with one alternate.
#
# Primary chain: node-e:5550 (first) → node-d:5551 (last)
# Alternate for the first worker:  node-b:5557
#
# On --simulate-fail-step 2, the client should detect the synthetic
# failure, advance its candidate cursor for the first-worker slot,
# and re-open the stream against node-b:5557 — the chain continues
# to completion via the alternate.
model:
  id: "prithvi-q8"
  hidden_size: 3072
  num_blocks: 28
  wire_dtype: f32

workers:
  - id: node-e-test
    address: 203.0.113.11
    port: 5550
    layer_range: [0, 14]
    sub_gguf_path: /tmp/w0_v2.gguf
    mode: first
    alternates:
      - id: node-b-alt-first
        address: 203.0.113.12
        port: 5557
        layer_range: [0, 14]
        sub_gguf_path: /tmp/w0_v2.gguf
        mode: first
  - id: node-d-test
    address: 203.0.113.14
    port: 5551
    layer_range: [14, 28]
    sub_gguf_path: /tmp/wlast_v2.gguf
    mode: last
