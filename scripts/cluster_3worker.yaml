# 3-worker cluster across home PC + node-f + node-e.
# Hidden state per token: 3072 fp32 = 12 KB; 6 prompt tokens × 2 hops = 144 KB.
model:
  id: "prithvi-q8"
  hidden_size: 3072
  num_blocks: 28
  wire_dtype: f32

workers:
  - id: home-pc
    address: 203.0.113.10      # Linux, layers [0,10)
    port: 5530
    layer_range: [0, 10]
    sub_gguf_path: /tmp/cuts3/w0.gguf
    mode: first
  - id: node-f
    address: 203.0.113.13       # Mac, middle, layers [10,19)
    port: 5532
    layer_range: [10, 19]
    sub_gguf_path: /tmp/wmid3.gguf
    mode: middle
  - id: node-e
    address: 203.0.113.11      # Mac, layers [19,28)
    port: 5531
    layer_range: [19, 28]
    sub_gguf_path: /tmp/wlast3.gguf
    mode: last
